<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP追剧神器</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; width: 90%; max-width: 480px; padding: 25px 20px; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); text-align: center; }
        h3 { margin-bottom: 20px; color: #333; }
        input[type="text"] { width: 85%; padding: 12px; border: 2px solid #ddd; border-radius: 12px; font-size: 14px; margin-bottom: 15px; outline: none; }
        input[type="text"]:focus { border-color: #2196F3; }
        .platforms { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
        .platforms button { flex: 1 1 22%; padding: 10px 4px; background: #e3f2fd; border: none; border-radius: 10px; color: #1976D2; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .platforms button:hover { background: #bbdefb; }
        .action-btn { width: 85%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 6px 0; transition: 0.2s; }
        .play-btn { background: #2196F3; color: white; }
        .play-btn:hover { background: #1976D2; }
        .clear-btn { background: #f5f5f5; color: #555; }
        .clear-btn:hover { background: #e0e0e0; }
        .warning { color: red; font-weight: bold; margin-top: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h3>📺 输入视频网址</h3>
        <input type="text" id="videoUrl" placeholder="粘贴视频链接（爱奇艺/腾讯/优酷/B站等）">
        <br>
        <button class="action-btn clear-btn" onclick="clearUrl()">清空链接</button>
        
        <div class="platforms">
            <button onclick="openSite('https://www.iqiyi.com')">爱奇艺</button>
            <button onclick="openSite('https://v.qq.com')">腾讯视频</button>
            <button onclick="openSite('https://www.youku.com/')">优酷</button>
            <button onclick="openSite('https://www.bilibili.com/')">bilibili</button>
        </div>
        
        <button class="action-btn play-btn" onclick="playVideo()">▶️ 播放VIP视频</button>
        <p class="warning">⚠️ 提示：本案例仅供学习使用，不可作为他用。</p>
    </div>

    <script>
        function openSite(url) {
            window.open(url, '_blank');
        }

        function playVideo() {
            const video = document.getElementById('videoUrl').value.trim();
            if (!video) {
                alert('请先粘贴视频网址');
                return;
            }
            // 解析接口（可自行替换）
            window.open('https://jx.xmflv.cc/?url=' + video, '_blank');
        }

        function clearUrl() {
            document.getElementById('videoUrl').value = '';
        }

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW 注册成功'))
                    .catch(err => console.log('SW 注册失败', err));
            });
        }
    </script>
</body>
</html>
